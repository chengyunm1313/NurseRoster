    <rect x="1032" y="358" width="54" height="26" rx="8" fill="#FFFFFF"/><text x="1046" y="376">編輯</text>
    <rect x="1092" y="358" width="54" height="26" rx="8" fill="#FFFFFF"/><text x="1106" y="376">刪除</text>
