  <rect x="760" y="164" width="396" height="36" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="774" y="188" font-family="Inter, Arial" font-size="12" fill="#9A3412">匯入前會先顯示「資料預覽」與欄位對應檢查</text>
