  <text x="872" y="570" font-family="Inter, Arial" font-size="11" fill="#991B1B">但每次修改都要重新驗證硬性規則。</text>

  <rect x="856" y="628" width="296" height="40" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
