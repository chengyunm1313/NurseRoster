  <rect x="44" y="180" width="328" height="34" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="56" y="202" font-family="Inter, Arial" font-size="13" fill="#0F172A">2026/01/01 ～ 2026/01/31 ▾</text>

