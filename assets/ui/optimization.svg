  <text x="872" y="308" font-family="Inter, Arial" font-size="12" fill="#475569">硬性違規：0 • 分數：82</text>
  <text x="872" y="328" font-family="Inter, Arial" font-size="12" fill="#475569">夜班公平：中 • 偏好滿足：高</text>

  <rect x="856" y="354" width="296" height="86" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="872" y="382" font-family="Inter, Arial" font-size="13" fill="#0F172A">方案 C</text>
  <text x="872" y="404" font-family="Inter, Arial" font-size="12" fill="#475569">硬性違規：0 • 分數：78</text>
  <text x="872" y="424" font-family="Inter, Arial" font-size="12" fill="#475569">夜班公平：高 • 偏好滿足：低</text>

  <!-- Actions -->
