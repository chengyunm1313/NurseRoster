  <text x="872" y="212" font-family="Inter, Arial" font-size="12" fill="#475569">硬性違規：0 • 分數：86</text>
  <text x="872" y="232" font-family="Inter, Arial" font-size="12" fill="#475569">夜班公平：佳 • 偏好滿足：中</text>

  <rect x="856" y="258" width="296" height="86" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
