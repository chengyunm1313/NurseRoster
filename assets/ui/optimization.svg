  <text x="436" y="246" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="12" fill="#E2E8F0">[00:15] 搜尋解 #2… 分數 86</text>

  <rect x="420" y="268" width="388" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
