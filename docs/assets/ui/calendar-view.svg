  <!-- Legend -->
  <text x="36" y="380" font-family="Inter, Arial" font-size="12" fill="#475569">班別圖例</text>
  <rect x="36" y="394" width="12" height="12" rx="3" fill="#22C55E"/><text x="56" y="404" font-family="Inter, Arial" font-size="12" fill="#0F172A">早班</text>
  <rect x="36" y="416" width="12" height="12" rx="3" fill="#3B82F6"/><text x="56" y="426" font-family="Inter, Arial" font-size="12" fill="#0F172A">小夜</text>
  <rect x="36" y="438" width="12" height="12" rx="3" fill="#8B5CF6"/><text x="56" y="448" font-family="Inter, Arial" font-size="12" fill="#0F172A">大夜</text>
  <rect x="36" y="460" width="12" height="12" rx="3" fill="#94A3B8"/><text x="56" y="470" font-family="Inter, Arial" font-size="12" fill="#0F172A">休假</text>

