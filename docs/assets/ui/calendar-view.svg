  <rect x="252" y="96" width="932" height="648" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- Page header -->
  <text x="276" y="130" font-family="Inter, Arial" font-size="18" fill="#0F172A">行事曆檢視</text>
