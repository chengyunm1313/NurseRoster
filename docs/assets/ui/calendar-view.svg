<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="760" fill="#F8FAFC"/>

  <!-- Top Bar -->
  <rect x="16" y="16" width="1168" height="64" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="36" y="56" font-family="Inter, Arial" font-size="20" fill="#0F172A">護理師排班系統</text>

  <!-- Project / Period -->
  <rect x="260" y="30" width="260" height="36" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="274" y="54" font-family="Inter, Arial" font-size="13" fill="#475569">專案：內科病房 A（2026/01）</text>

  <!-- Global actions -->
  <rect x="830" y="30" width="110" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="852" y="54" font-family="Inter, Arial" font-size="13" fill="#0F172A">匯入資料</text>

  <rect x="948" y="30" width="110" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="970" y="54" font-family="Inter, Arial" font-size="13" fill="#0F172A">匯出班表</text>

  <rect x="1066" y="30" width="98" height="36" rx="10" fill="#2563EB"/>
  <text x="1086" y="54" font-family="Inter, Arial" font-size="13" fill="#FFFFFF">儲存</text>

  <!-- Left Nav -->
  <rect x="16" y="96" width="220" height="648" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
