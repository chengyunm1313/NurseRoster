  <g font-family="Inter, Arial" font-size="12" fill="#0F172A">
    <text x="292" y="292">王小明</text>
    <text x="292" y="332">陳美玲</text>
    <text x="292" y="372">林怡君</text>
    <text x="292" y="412">張雅雯</text>
    <text x="292" y="452">黃志豪</text>
    <text x="292" y="492">李佳穎</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#E2E8F0">
    <!-- vertical lines (rough) -->
    <line x1="360" y1="222" x2="360" y2="708"/>
    <line x1="480" y1="222" x2="480" y2="708"/>
    <line x1="600" y1="222" x2="600" y2="708"/>
    <line x1="720" y1="222" x2="720" y2="708"/>
    <line x1="840" y1="222" x2="840" y2="708"/>
    <line x1="960" y1="222" x2="960" y2="708"/>
    <line x1="1080" y1="222" x2="1080" y2="708"/>
    <!-- horizontal lines -->
    <line x1="276" y1="302" x2="1160" y2="302"/>
    <line x1="276" y1="342" x2="1160" y2="342"/>
    <line x1="276" y1="382" x2="1160" y2="382"/>
    <line x1="276" y1="422" x2="1160" y2="422"/>
    <line x1="276" y1="462" x2="1160" y2="462"/>
    <line x1="276" y1="502" x2="1160" y2="502"/>
  </g>

  <!-- Sample shift chips -->
  <g font-family="Inter, Arial" font-size="11" fill="#0F172A">
    <rect x="370" y="276" width="96" height="22" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
    <text x="388" y="291">早班</text>

    <rect x="610" y="316" width="96" height="22" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="628" y="331">小夜</text>

    <rect x="850" y="356" width="96" height="22" rx="8" fill="#EDE9FE" stroke="#C4B5FD"/>
    <text x="868" y="371">大夜</text>

    <rect x="970" y="396" width="96" height="22" rx="8" fill="#E2E8F0" stroke="#CBD5E1"/>
    <text x="988" y="411">休假</text>
  </g>

  <!-- Right side note -->
  <rect x="930" y="548" width="230" height="160" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="946" y="574" font-family="Inter, Arial" font-size="12" fill="#0F172A">操作提示</text>
  <text x="946" y="596" font-family="Inter, Arial" font-size="11" fill="#475569">• 拖拉班別可調整日期</text>
  <text x="946" y="616" font-family="Inter, Arial" font-size="11" fill="#475569">• 點班別可看明細/備註</text>
  <text x="946" y="636" font-family="Inter, Arial" font-size="11" fill="#475569">• 衝突會以紅色提示</text>
  <text x="946" y="656" font-family="Inter, Arial" font-size="11" fill="#475569">• 變更後需「儲存」</text>
</svg>
