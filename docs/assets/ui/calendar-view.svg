  <rect x="528" y="172" width="150" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="542" y="196" font-family="Inter, Arial" font-size="13" fill="#0F172A">科別：內科A ▾</text>

  <rect x="690" y="172" width="150" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="704" y="196" font-family="Inter, Arial" font-size="13" fill="#0F172A">顯示：週檢視 ▾</text>

  <rect x="852" y="172" width="90" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="870" y="196" font-family="Inter, Arial" font-size="13" fill="#0F172A">今天</text>

  <rect x="948" y="172" width="110" height="36" rx="10" fill="#2563EB"/>
  <text x="966" y="196" font-family="Inter, Arial" font-size="13" fill="#FFFFFF">新增班別</text>

  <rect x="1066" y="172" width="94" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="1084" y="196" font-family="Inter, Arial" font-size="13" fill="#0F172A">衝突</text>

  <!-- Calendar grid area -->
  <rect x="276" y="222" width="884" height="486" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>

  <!-- Grid header: dates -->
  <rect x="276" y="222" width="884" height="40" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="292" y="248" font-family="Inter, Arial" font-size="12" fill="#475569">人員</text>

  <!-- Date columns -->
  <g font-family="Inter, Arial" font-size="12" fill="#0F172A">
    <text x="400" y="248">一 01/05</text>
    <text x="520" y="248">二 01/06</text>
    <text x="640" y="248">三 01/07</text>
    <text x="760" y="248">四 01/08</text>
    <text x="880" y="248">五 01/09</text>
    <text x="1000" y="248">六 01/10</text>
    <text x="1120" y="248">日 01/11</text>
  </g>

